# GitHub Pages / Jekyll configuration for ClaimCheck Daily
title: ClaimCheck Daily
description: Automated fact-checking powered by Claude + GPT-4o
baseurl: "/ClaimCheck_Daily_v3"
url: "https://bharanirajendran-blip.github.io"

# We're writing plain HTML, so disable Jekyll processing on HTML files
# but keep it active so GitHub Pages serves the site correctly.
theme: null

# Exclude non-web files from the published site
exclude:
  - "*.py"
  - "*.md"
  - ".gitkeep"
